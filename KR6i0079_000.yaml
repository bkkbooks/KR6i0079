front:
  text: 刊維摩經義記序余甞見天僧統教藏總錄曰維摩經義記四卷慧遠撰因謂吾祖智者大師疏觀經也多採用淨影於維摩經想亦當然頃一書賈齎義記一帙至余得之欣然讀之雖不如素意而其釋最委至其伸釋一義多先徵起後方解之實不忘本母之體關中嘉祥不得抗衡也吾祖釋義事理兩圓而以理觀為主事解稍略故先讀斯記而後以智者融譚則可乎但脫誤尤多後之得善本者幸正之旹正德壬辰冬十月既朔比叡山寶珠沙門可透謹序
